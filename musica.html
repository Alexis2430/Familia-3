<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP Music OS - Independiente</title>
    <script src="https://www.youtube.com/iframe_api"></script>
    <style>
        :root { --dorado: #ffca2c; --negro: #050505; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Courier New', Courier, monospace; }
        
        body {
            background: var(--negro) url('img/Fondo.png') center/cover fixed;
            color: white; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px;
        }
        body::before { content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 0; }

        .player-shell {
            position: relative; z-index: 10; width: 100%; max-width: 500px;
            background: #111; border: 1px solid var(--dorado); padding: 30px;
            box-shadow: 0 0 50px rgba(255, 202, 44, 0.1);
        }

        .system-header { border-bottom: 1px solid #333; margin-bottom: 20px; display: flex; justify-content: space-between; font-size: 0.7rem; color: var(--dorado); padding-bottom: 5px; }

        /* Buscador */
        .search-box { display: flex; gap: 10px; margin-bottom: 20px; }
        .search-box input { 
            flex: 1; background: #000; border: 1px solid #444; color: var(--dorado); 
            padding: 10px; font-size: 0.8rem; outline: none;
        }
        .search-box input:focus { border-color: var(--dorado); }
        .btn-load { background: var(--dorado); color: #000; border: none; padding: 10px 15px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 0.7rem; }

        /* Pantalla de Reproducción */
        .screen-display { 
            background: #000; border: 1px solid #222; height: 120px; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            margin-bottom: 20px; position: relative;
        }
        #yt-player-hidden { position: absolute; opacity: 0; pointer-events: none; }
        
        .visualizer { display: flex; align-items: flex-end; gap: 3px; height: 30px; margin-top: 10px; }
        .v-bar { width: 4px; background: var(--dorado); animation: wave 0.6s infinite alternate; }

        @keyframes wave { from { height: 4px; } to { height: 25px; } }

        .controls-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; }
        .btn-main { 
            background: transparent; border: 1px solid var(--dorado); color: var(--dorado); 
            padding: 15px; cursor: pointer; transition: 0.3s; font-weight: bold;
        }
        .btn-main:hover { background: var(--dorado); color: black; box-shadow: 0 0 15px var(--dorado); }

        .footer-nav { margin-top: 30px; text-align: center; border-top: 1px solid #333; padding-top: 15px; }
        .back-link { color: var(--dorado); text-decoration: none; font-size: 0.7rem; opacity: 0.6; }
    </style>
</head>
<body>

    <div id="yt-player-hidden"></div>

    <div class="player-shell">
        <div class="system-header">
            <span>MODO: LIBRE_Y_TOTAL</span>
            <span id="status-text">ESPERANDO ENTRADA...</span>
        </div>

        <div class="search-box">
            <input type="text" id="url-input" placeholder="Pega link de YouTube aquí...">
            <button class="btn-load" onclick="loadFromUrl()">CARGAR</button>
        </div>

        <div class="screen-display">
            <div id="song-info" style="text-align: center;">
                <p id="track-name" style="font-size: 1rem; color: var(--dorado);">SISTEMA_STANDBY</p>
                <p id="track-status" style="font-size: 0.6rem; opacity: 0.5;">INGRESA UNA URL PARA EMPEZAR</p>
            </div>
            <div class="visualizer" id="viz" style="display: none;">
                <div class="v-bar" style="animation-delay: 0.1s"></div>
                <div class="v-bar" style="animation-delay: 0.3s"></div>
                <div class="v-bar" style="animation-delay: 0.2s"></div>
                <div class="v-bar" style="animation-delay: 0.4s"></div>
                <div class="v-bar" style="animation-delay: 0.1s"></div>
            </div>
        </div>

        <div class="controls-grid">
            <button class="btn-main" onclick="player.seekTo(player.getCurrentTime() - 10)">-10s</button>
            <button class="btn-main" id="play-pause" onclick="togglePlayback()">PLAY</button>
            <button class="btn-main" onclick="player.seekTo(player.getCurrentTime() + 10)">+10s</button>
        </div>

        <div class="footer-nav">
            <a href="Menu.html" class="back-link">[ REGRESAR AL SISTEMA ]</a>
        </div>
    </div>

    <script>
        let player;
        let isPlaying = false;

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('yt-player-hidden', {
                height: '0', width: '0',
                events: {
                    'onStateChange': onPlayerStateChange,
                    'onError': () => { alert("Error al cargar el video, paps."); }
                }
            });
        }

        function loadFromUrl() {
            const url = document.getElementById('url-input').value;
            const videoId = extractVideoID(url);
            
            if (videoId) {
                player.loadVideoById(videoId);
                document.getElementById('track-name').innerText = "CONECTANDO...";
                document.getElementById('viz').style.display = 'flex';
                document.getElementById('status-text').innerText = "STREAMING...";
            } else {
                alert("Ese no es un link de YouTube válido, bro.");
            }
        }

        function extractVideoID(url) {
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length == 11) ? match[2] : null;
        }

        function togglePlayback() {
            if (isPlaying) {
                player.pauseVideo();
                document.getElementById('play-pause').innerText = "PLAY";
            } else {
                player.playVideo();
                document.getElementById('play-pause').innerText = "PAUSE";
            }
            isPlaying = !isPlaying;
        }

        function onPlayerStateChange(event) {
            if (event.data == YT.PlayerState.PLAYING) {
                const videoData = player.getVideoData();
                document.getElementById('track-name').innerText = videoData.title;
                document.getElementById('track-status').innerText = "REPRODUCIENDO AHORA";
                document.getElementById('play-pause').innerText = "PAUSE";
                isPlaying = true;
            }
        }
    </script>
</body>
</html>
