<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP Audio Experience</title>
    <script src="https://www.youtube.com/iframe_api"></script>
    <style>
        :root { --accent: #ffca2c; --bg: #000000; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        body { background-color: var(--bg); color: white; min-height: 100vh; overflow: hidden; transition: background 1s ease; }

        /* Contenedor Principal */
        .player-wrapper { 
            display: grid; grid-template-columns: 1fr 1fr; height: 100vh; padding: 40px; gap: 40px; 
            background: linear-gradient(180deg, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.8) 100%);
        }

        /* Lado Izquierdo: Portada y Controles */
        .visual-side { display: flex; flex-direction: column; justify-content: center; align-items: center; }
        
        .cover-art { 
            width: 350px; height: 350px; border-radius: 20px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); 
            background-size: cover; background-position: center;
            transition: all 0.5s ease; border: 1px solid rgba(255,255,255,0.1);
        }

        .song-info { margin-top: 30px; text-align: left; width: 350px; }
        .song-info h1 { font-size: 2rem; color: #fff; }
        .song-info p { color: var(--accent); opacity: 0.8; font-weight: bold; }

        /* Ecualizador Reactivo (Simulado) */
        .eq-container { display: flex; gap: 4px; height: 30px; margin-top: 20px; }
        .eq-bar { width: 4px; background: var(--accent); animation: eq 0.4s infinite alternate; }

        /* Lado Derecho: Letras */
        .lyrics-side { 
            overflow-y: auto; display: flex; flex-direction: column; 
            justify-content: flex-start; padding-right: 20px; mask-image: linear-gradient(transparent, white 20%, white 80%, transparent);
        }
        .lyrics-side::-webkit-scrollbar { display: none; }
        
        .lyric-line { 
            font-size: 2.2rem; font-weight: 800; margin-bottom: 20px; opacity: 0.2; 
            transition: all 0.4s ease; cursor: pointer; line-height: 1.2;
        }
        .lyric-line.active { opacity: 1; color: var(--accent); transform: scale(1.05); text-shadow: 0 0 20px var(--accent); }

        /* Barra de Progreso y Botones */
        .controls-footer { position: fixed; bottom: 0; left: 0; width: 100%; padding: 20px 40px; background: rgba(0,0,0,0.5); backdrop-filter: blur(10px); }
        .progress-area { width: 100%; display: flex; align-items: center; gap: 15px; margin-bottom: 10px; }
        .bar-bg { flex: 1; height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; position: relative; cursor: pointer; }
        .bar-fill { width: 0%; height: 100%; background: var(--accent); border-radius: 3px; box-shadow: 0 0 10px var(--accent); }
        
        .buttons { display: flex; justify-content: center; gap: 30px; align-items: center; }
        .btn { background: none; border: none; color: white; font-size: 1.5rem; cursor: pointer; transition: 0.3s; }
        .btn:hover { color: var(--accent); transform: scale(1.2); }
        .btn-play { background: white; color: black; width: 50px; height: 50px; border-radius: 50%; font-size: 1.2rem; }

        @keyframes eq { from { height: 5px; } to { height: 30px; } }
        
        /* Ocultar Player de YT */
        #yt-hidden { position: absolute; left: -9999px; }
    </style>
</head>
<body>

    <div id="yt-hidden"></div>

    <div class="player-wrapper" id="main-bg">
        <div class="visual-side">
            <div class="cover-art" id="cover" style="background-image: url('https://img.youtube.com/vi/VwM2reI_D_g/maxresdefault.jpg');"></div>
            <div class="song-info">
                <h1 id="track-title">CONECTANDO SISTEMA</h1>
                <p id="track-artist">INGRESA LINK DE YOUTUBE</p>
                <div class="eq-container">
                    <div class="eq-bar" style="animation-delay: 0.1s"></div>
                    <div class="eq-bar" style="animation-delay: 0.3s"></div>
                    <div class="eq-bar" style="animation-delay: 0.2s"></div>
                    <div class="eq-bar" style="animation-delay: 0.4s"></div>
                </div>
            </div>
            
            <input type="text" id="url-in" placeholder="Pega Link Aquí" style="margin-top: 20px; background: none; border: 1px solid var(--accent); color: white; padding: 10px; border-radius: 5px;">
            <button onclick="loadSong()" style="margin-top: 10px; color: var(--accent); background: none; border: none; cursor: pointer;">[ CARGAR NÚCLEO ]</button>
        </div>

        <div class="lyrics-side" id="lyrics-container">
            <p class="lyric-line" data-time="0">Bienvenido al Sistema</p>
            <p class="lyric-line" data-time="5">Selecciona tu música</p>
            <p class="lyric-line" data-time="10">VIP Experience</p>
        </div>
    </div>

    <div class="controls-footer">
        <div class="progress-area">
            <span id="cur-time">0:00</span>
            <div class="bar-bg" onclick="seek(event)">
                <div class="bar-fill" id="progress"></div>
            </div>
            <span id="dur-time">0:00</span>
        </div>
        <div class="buttons">
            <button class="btn">⏮</button>
            <button class="btn btn-play" id="play-btn" onclick="togglePlay()">▶</button>
            <button class="btn">⏭</button>
            <button class="btn" onclick="window.location.href='Menu.html'">✖</button>
        </div>
    </div>

    <script>
        let player;
        let isPlaying = false;

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('yt-hidden', {
                height: '0', width: '0',
                events: { 'onStateChange': onStateChange }
            });
        }

        function loadSong() {
            const url = document.getElementById('url-in').value;
            const id = url.split('v=')[1]?.split('&')[0] || url.split('/').pop();
            if(id) {
                player.loadVideoById(id);
                document.getElementById('cover').style.background-image = `url('https://img.youtube.com/vi/${id}/maxresdefault.jpg')`;
                // Aquí podrías cambiar el color --accent basado en la canción
            }
        }

        function togglePlay() {
            if(isPlaying) { player.pauseVideo(); document.getElementById('play-btn').innerText = "▶"; }
            else { player.playVideo(); document.getElementById('play-btn').innerText = "||"; }
            isPlaying = !isPlaying;
        }

        function onStateChange(event) {
            if(event.data == YT.PlayerState.PLAYING) {
                const data = player.getVideoData();
                document.getElementById('track-title').innerText = data.title;
                document.getElementById('track-artist').innerText = data.author;
                updateLyrics();
            }
        }

        // Lógica de Letras y Progreso
        setInterval(() => {
            if(player && player.getCurrentTime) {
                const cur = player.getCurrentTime();
                const dur = player.getDuration();
                document.getElementById('progress').style.width = (cur/dur*100) + "%";
                document.getElementById('cur-time').innerText = formatTime(cur);
                document.getElementById('dur-time').innerText = formatTime(dur);
                
                // Sincronizar letras
                const lines = document.querySelectorAll('.lyric-line');
                lines.forEach(line => {
                    if(cur >= line.getAttribute('data-time')) {
                        lines.forEach(l => l.classList.remove('active'));
                        line.classList.add('active');
                        line.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }
                });
            }
        }, 500);

        function formatTime(s) {
            const m = Math.floor(s/60);
            const sec = Math.floor(s%60);
            return `${m}:${sec < 10 ? '0' : ''}${sec}`;
        }
    </script>
</body>
</html>
