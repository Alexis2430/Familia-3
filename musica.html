<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP Spotify Experience</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vibrant.js/2.1.0/Vibrant.min.js"></script>
    <style>
        :root {
            --accent: #ffca2c; /* Color inicial */
            --bg-dark: #000000;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

        body {
            background-color: var(--bg-dark);
            /* Gradiente que cambia con el acento */
            background: radial-gradient(circle at 50% 0%, var(--accent) -80%, var(--bg-dark) 70%);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: background 1.5s ease;
            overflow: hidden;
        }

        .main-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 900px;
            padding: 40px;
            z-index: 10;
        }

        .header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .header h2 {
            font-size: 0.7rem;
            letter-spacing: 5px;
            color: var(--accent);
            text-shadow: 0 0 10px var(--accent);
        }

        /* Selector de Playlists */
        .playlist-selector {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            overflow-x: auto;
            width: 100%;
            padding: 10px 0;
        }

        .playlist-selector::-webkit-scrollbar { display: none; }

        .pl-card {
            min-width: 120px;
            cursor: pointer;
            text-align: center;
            transition: 0.3s;
            opacity: 0.6;
        }

        .pl-card:hover, .pl-card.active { opacity: 1; transform: scale(1.1); }

        .pl-card img {
            width: 100px;
            height: 100px;
            border-radius: 10px;
            border: 2px solid transparent;
            margin-bottom: 5px;
        }

        .pl-card.active img { border-color: var(--accent); box-shadow: 0 0 15px var(--accent); }

        /* Reproductor */
        .spotify-wrapper {
            width: 100%;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
            border: 1px solid rgba(255,255,255,0.1);
            background: #000;
            transition: box-shadow 1s ease;
        }

        .spotify-wrapper:hover { box-shadow: 0 0 40px var(--accent); }

        .btn-back {
            margin-top: 40px;
            text-decoration: none;
            color: white;
            font-size: 0.7rem;
            border: 1px solid rgba(255,255,255,0.2);
            padding: 10px 20px;
            transition: 0.3s;
        }

        .btn-back:hover { border-color: var(--accent); color: var(--accent); }

    </style>
</head>
<body>

    <div class="main-content">
        <div class="header">
            <h2>NÚCLEO_MUSICAL_VIP</h2>
            <span id="system-status" style="font-size: 10px;">ADAPTANDO ENTORNO...</span>
        </div>

        <div class="playlist-selector" id="selector">
            <div class="pl-card active" onclick="changePL('4M7vRzXyZisD4YhG7f3iY8', 'https://i.scdn.co/image/ab67706f000000030c6a85817765f02c98492025', this)">
                <img src="https://i.scdn.co/image/ab67706f000000030c6a85817765f02c98492025" crossorigin="anonymous">
                <p style="font-size: 10px;">Mix VIP</p>
            </div>
            <div class="pl-card" onclick="changePL('37i9dQZF1DXcBWIGoYBM3M', 'https://i.scdn.co/image/ab67706f000000036612d1b54f676b772c7336a1', this)">
                <img src="https://i.scdn.co/image/ab67706f000000036612d1b54f676b772c7336a1" crossorigin="anonymous">
                <p style="font-size: 10px;">Reggaetón</p>
            </div>
            <div class="pl-card" onclick="changePL('37i9dQZF1DX8f6LHDCurm5', 'https://i.scdn.co/image/ab67706f000000032b85e05df852a39281a8c903', this)">
                <img src="https://i.scdn.co/image/ab67706f000000032b85e05df852a39281a8c903" crossorigin="anonymous">
                <p style="font-size: 10px;">Phonk</p>
            </div>
        </div>

        <div class="spotify-wrapper" id="player-container">
            <iframe id="sp-frame" src="https://open.spotify.com/embed/playlist/4M7vRzXyZisD4YhG7f3iY8?utm_source=generator&theme=0" width="100%" height="450" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
        </div>

        <a href="Menu.html" class="btn-back">SALIR DEL MODO INMERSIVO</a>
    </div>

    <script>
        function changePL(id, imgUrl, element) {
            // 1. Cambiar el iframe
            document.getElementById('sp-frame').src = `https://open.spotify.com/embed/playlist/${id}?utm_source=generator&theme=0`;
            
            // 2. Manejar clases activas
            document.querySelectorAll('.pl-card').forEach(c => c.classList.remove('active'));
            element.classList.add('active');

            // 3. LA MAGIA: Extraer color de la imagen
            const img = new Image();
            img.crossOrigin = "Anonymous";
            img.src = imgUrl;

            img.onload = function() {
                const vibrant = new Vibrant(img);
                const swatches = vibrant.swatches();
                
                // Buscamos el color más "vivo" o el "Vibrant"
                const targetColor = swatches['Vibrant'] ? swatches['Vibrant'].getHex() : '#ffca2c';
                
                // Aplicar a la variable CSS
                document.documentElement.style.setProperty('--accent', targetColor);
                document.getElementById('system-status').innerText = `SINCRONIZADO: ${targetColor}`;
            };
        }

        // Ejecutar la primera vez para el color inicial
        window.onload = () => {
            const firstImg = document.querySelector('.pl-card.active img');
            changePL('4M7vRzXyZisD4YhG7f3iY8', firstImg.src, document.querySelector('.pl-card.active'));
        };
    </script>
</body>
</html>
