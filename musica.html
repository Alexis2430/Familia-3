<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP Music Experience - Autoregulable</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vibrant.js/2.1.0/Vibrant.min.js"></script>
    <style>
        :root { --accent: #ffca2c; --bg-dark: #000000; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }

        body {
            background-color: var(--bg-dark);
            /* El aura neón que reacciona a la música */
            background: radial-gradient(circle at 50% -20%, var(--accent) -150%, var(--bg-dark) 85%);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: background 1.2s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
        }

        .main-container {
            width: 90%;
            max-width: 1000px;
            padding: 40px 20px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Título con estilo Cyber */
        .system-label {
            font-size: 0.6rem;
            letter-spacing: 7px;
            color: var(--accent);
            text-shadow: 0 0 15px var(--accent);
            margin-bottom: 30px;
            text-transform: uppercase;
            font-weight: 900;
        }

        /* Selector de Tarjetas VIP */
        .playlist-nav {
            display: flex;
            gap: 20px;
            margin-bottom: 40px;
            width: 100%;
            justify-content: center;
        }

        .pl-card {
            cursor: pointer;
            transition: all 0.5s ease;
            text-align: center;
            width: 140px;
        }

        .pl-card img {
            width: 120px;
            height: 120px;
            border-radius: 15px;
            border: 2px solid rgba(255,255,255,0.1);
            transition: all 0.5s ease;
            filter: grayscale(40%);
        }

        .pl-card p {
            font-size: 0.7rem;
            margin-top: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.5;
            font-weight: bold;
        }

        .pl-card.active img {
            filter: grayscale(0%);
            border-color: var(--accent);
            box-shadow: 0 0 30px var(--accent);
            transform: translateY(-10px) scale(1.1);
        }

        .pl-card.active p { opacity: 1; color: var(--accent); }

        /* Contenedor del Reproductor */
        .player-box {
            width: 100%;
            border-radius: 25px;
            overflow: hidden;
            background: #000;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 40px 100px rgba(0,0,0,0.9);
            transition: box-shadow 1s ease;
        }

        .player-box:hover { box-shadow: 0 0 50px rgba(var(--accent-rgb), 0.3); }

        .btn-back {
            margin-top: 50px;
            text-decoration: none;
            color: rgba(255,255,255,0.4);
            font-size: 0.6rem;
            letter-spacing: 3px;
            border: 1px solid rgba(255,255,255,0.1);
            padding: 12px 30px;
            transition: 0.3s;
            border-radius: 50px;
        }

        .btn-back:hover { 
            color: var(--accent); 
            border-color: var(--accent); 
            background: rgba(255,255,255,0.05);
        }

    </style>
</head>
<body>

    <div class="main-container">
        <div class="system-label" id="status">Sincronizando_Frecuencia_VIP</div>

        <div class="playlist-nav">
            <div class="pl-card active" onclick="updateSystem('37i9dQZF1DX8f6LHDCurm5', 'https://i.scdn.co/image/ab67706f000000032b85e05df852a39281a8c903', this)">
                <img src="https://i.scdn.co/image/ab67706f000000032b85e05df852a39281a8c903" crossorigin="anonymous">
                <p>Reguetón</p>
            </div>
            
            <div class="pl-card" onclick="updateSystem('4M7vRzXyZisD4YhG7f3iY8', 'https://i.scdn.co/image/ab67706f000000030c6a85817765f02c98492025', this)">
                <img src="https://i.scdn.co/image/ab67706f000000030c6a85817765f02c98492025" crossorigin="anonymous">
                <p>Proyectarse</p>
            </div>

            <div class="pl-card" onclick="updateSystem('2Z8N03n9CAt2eM2L7I7n9A', 'https://i.scdn.co/image/ab67706f00000003b879c941d9992d9551c6a6c4', this)">
                <img src="https://i.scdn.co/image/ab67706f00000003b879c941d9992d9551c6a6c4" crossorigin="anonymous">
                <p>Familia <3</p>
            </div>
        </div>

        <div class="player-box">
            <iframe id="spotify-frame" 
                src="http://googleusercontent.com/spotify.com/7" 
                width="100%" height="450" frameBorder="0" allowfullscreen="" 
                allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy">
            </iframe>
        </div>

        <a href="Menu.html" class="btn-back">[ VOLVER AL NÚCLEO ]</a>
    </div>

    <script>
        function updateSystem(id, imgUrl, element) {
            // Actualizar el reproductor
            const frame = document.getElementById('spotify-frame');
            frame.src = `http://googleusercontent.com/spotify.com/8{id}?utm_source=generator&theme=0`;

            // Estilo visual de la tarjeta seleccionada
            document.querySelectorAll('.pl-card').forEach(c => c.classList.remove('active'));
            element.classList.add('active');

            // Magia de color autorregulable
            const img = new Image();
            img.crossOrigin = "Anonymous";
            img.src = imgUrl;

            img.onload = function() {
                const vibrant = new Vibrant(img);
                const swatches = vibrant.swatches();
                // Extrae el color vibrante, si no hay usa el dorado por default
                const newAccent = swatches['Vibrant'] ? swatches['Vibrant'].getHex() : '#ffca2c';
                
                document.documentElement.style.setProperty('--accent', newAccent);
                document.getElementById('status').innerText = `MODO_ACTIVO: ${element.innerText}`;
            };
        }

        // Carga inicial
        window.onload = () => {
            const active = document.querySelector('.pl-card.active');
            // Simulamos el primer clic para activar el color
            updateSystem('37i9dQZF1DX8f6LHDCurm5', active.querySelector('img').src, active);
        };
    </script>
</body>
</html>
