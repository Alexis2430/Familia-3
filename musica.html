<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP Music Experience</title>
    <style>
        :root { --accent: #ffca2c; --bg-dark: #000000; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        
        body {
            background-color: var(--bg-dark);
            background: radial-gradient(circle at 50% -20%, var(--accent) -150%, var(--bg-dark) 85%);
            color: white; min-height: 100vh; display: flex; flex-direction: column; align-items: center;
            transition: background 1.5s ease; overflow-x: hidden;
        }

        .main-container { width: 90%; max-width: 1000px; padding: 40px 20px; z-index: 10; display: flex; flex-direction: column; align-items: center; }

        .system-label { 
            font-size: 0.6rem; letter-spacing: 7px; color: var(--accent); 
            text-shadow: 0 0 15px var(--accent); margin-bottom: 30px; 
            text-transform: uppercase; font-weight: 900; text-align: center;
        }

        .playlist-nav { display: flex; gap: 20px; margin-bottom: 40px; width: 100%; justify-content: center; flex-wrap: wrap; }

        .pl-card { cursor: pointer; transition: all 0.5s ease; text-align: center; width: 120px; }

        .cover-box {
            width: 100px; height: 100px; border-radius: 15px; 
            background: #111; border: 2px solid rgba(255,255,255,0.1);
            display: flex; align-items: center; justify-content: center;
            font-size: 2rem; transition: all 0.5s ease;
        }

        .pl-card.active .cover-box { 
            border-color: var(--accent); 
            box-shadow: 0 0 30px var(--accent); 
            transform: translateY(-10px) scale(1.1); 
        }

        .player-box { 
            width: 100%; border-radius: 25px; overflow: hidden; 
            background: #000; border: 1px solid rgba(255,255,255,0.1); 
            height: 500px; box-shadow: 0 40px 100px rgba(0,0,0,0.9);
        }

        .btn-back { 
            margin-top: 50px; text-decoration: none; color: white; 
            font-size: 0.6rem; letter-spacing: 3px; border: 1px solid var(--accent); 
            padding: 12px 30px; border-radius: 50px; transition: 0.3s;
        }
        .btn-back:hover { background: var(--accent); color: black; }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="system-label" id="status">SISTEMA_VIP_ONLINE</div>

        <div class="playlist-nav">
            <div class="pl-card active" onclick="updateSystem('37i9dQZF1DX8f6LHDCurm5', '#E8115B', this)">
                <div class="cover-box">🔥</div>
                <p style="font-size: 9px; margin-top: 10px; opacity: 0.7;">REGUETÓN</p>
            </div>
            <div class="pl-card" onclick="updateSystem('4M7vRzXyZisD4YhG7f3iY8', '#1DB954', this)">
                <div class="cover-box">🌌</div>
                <p style="font-size: 9px; margin-top: 10px; opacity: 0.7;">PROYECTARSE</p>
            </div>
            <div class="pl-card" onclick="updateSystem('2Z8N03n9CAt2eM2L7I7n9A', '#509BF5', this)">
                <div class="cover-box">🏠</div>
                <p style="font-size: 9px; margin-top: 10px; opacity: 0.7;">FAMILIA</p>
            </div>
        </div>

        <div class="player-box">
            <iframe id="spotify-frame" 
                src="https://open.spotify.com/embed/playlist/37i9dQZF1DX8f6LHDCurm5?utm_source=generator&theme=0" 
                width="100%" height="500" frameBorder="0" 
                allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture">
            </iframe>
        </div>

        <a href="Menu.html" class="btn-back">REGRESAR AL NÚCLEO</a>
    </div>

    <script>
        function updateSystem(id, hexColor, element) {
            const frame = document.getElementById('spotify-frame');
            // ENLACE DIRECTO SIN INTERMEDIARIOS
            frame.src = "https://open.spotify.com/embed/playlist/" + id + "?utm_source=generator&theme=0";

            document.querySelectorAll('.pl-card').forEach(c => c.classList.remove('active'));
            element.classList.add('active');

            document.documentElement.style.setProperty('--accent', hexColor);
            document.getElementById('status').innerText = "MODO_ACTIVO: " + element.querySelector('p').innerText;
        }
    </script>
</body>
</html>
