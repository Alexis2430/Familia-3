<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP Music</title>
    <style>
        :root { --accent: #00ff88; }
        body {
            background: #000 radial-gradient(circle at 50% -20%, var(--accent) -200%, #000 90%);
            color: white; font-family: sans-serif; min-height: 100vh;
            display: flex; flex-direction: column; align-items: center; transition: 0.8s;
        }
        .nav { display: flex; gap: 20px; margin: 40px 0; }
        .card { cursor: pointer; text-align: center; opacity: 0.5; transition: 0.3s; }
        .card.active { opacity: 1; transform: scale(1.1); }
        .box { width: 80px; height: 80px; border-radius: 15px; border: 2px solid var(--accent); display: flex; align-items: center; justify-content: center; font-size: 2rem; box-shadow: 0 0 15px var(--accent); }
        .player-container { width: 90%; max-width: 800px; border-radius: 20px; overflow: hidden; background: #000; border: 1px solid #333; }
        iframe { display: block; border: none; }
        .btn { margin-top: 30px; color: var(--accent); text-decoration: none; border: 1px solid var(--accent); padding: 10px 20px; border-radius: 50px; font-size: 0.8rem; }
    </style>
</head>
<body>

    <h2 id="status" style="margin-top:30px; letter-spacing:5px; font-size:0.7rem; color:var(--accent)">SISTEMA_V_I_P</h2>

    <div class="nav">
        <div class="card active" onclick="play('37i9dQZF1DX8f6LHDCurm5', '#ff0055', 'REGUETÓN')">
            <div class="box">🔥</div>
            <p style="font-size:10px; margin-top:5px">REGUETÓN</p>
        </div>
        <div class="card" onclick="play('4M7vRzXyZisD4YhG7f3iY8', '#00d4ff', 'PROYECTARSE')">
            <div class="box">🌌</div>
            <p style="font-size:10px; margin-top:5px">PROYECTARSE</p>
        </div>
        <div class="card" onclick="play('2Z8N03n9CAt2eM2L7I7n9A', '#a200ff', 'FAMILIA')">
            <div class="box">🏠</div>
            <p style="font-size:10px; margin-top:5px">FAMILIA</p>
        </div>
    </div>

    <div class="player-container">
        <iframe id="sp" src="https://open.spotify.com/embed/playlist/37i9dQZF1DX8f6LHDCurm5?utm_source=generator&theme=0" width="100%" height="500" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"></iframe>
    </div>

    <a href="Menu.html" class="btn">VOLVER AL NÚCLEO</a>

    <script>
        function play(id, color, txt) {
            // La clave es armar el link pieza por pieza para que no haya errores
            const base = "https://open.spotify.com/embed/playlist/";
            const suffix = "?utm_source=generator&theme=0";
            document.getElementById('sp').src = base + id + suffix;

            document.documentElement.style.setProperty('--accent', color);
            document.getElementById('status').innerText = "MODO_" + txt;

            document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
            event.currentTarget.classList.add('active');
        }
    </script>
</body>
</html>
