<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP Music Experience</title>
    <style>
        /* Definimos los colores neón por default */
        :root { --accent: #00ff88; --bg-dark: #000000; }
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        
        body {
            background-color: var(--bg-dark);
            background: radial-gradient(circle at 50% -20%, var(--accent) -180%, var(--bg-dark) 90%);
            color: white; min-height: 100vh; display: flex; flex-direction: column; align-items: center;
            transition: all 0.8s ease; overflow-x: hidden;
        }

        .main-container { width: 95%; max-width: 800px; padding: 40px 10px; z-index: 10; display: flex; flex-direction: column; align-items: center; }

        .system-label { 
            font-size: 0.6rem; letter-spacing: 5px; color: var(--accent); 
            text-shadow: 0 0 15px var(--accent); margin-bottom: 30px; 
            text-transform: uppercase; font-weight: 900; text-align: center;
        }

        .playlist-nav { display: flex; gap: 15px; margin-bottom: 30px; width: 100%; justify-content: center; }

        .pl-card { cursor: pointer; transition: all 0.4s ease; text-align: center; width: 100px; }

        .cover-box {
            width: 80px; height: 80px; border-radius: 12px; 
            background: #111; border: 1px solid rgba(255,255,255,0.1);
            display: flex; align-items: center; justify-content: center;
            font-size: 2rem; transition: all 0.4s ease;
        }

        .pl-card.active .cover-box { 
            border-color: var(--accent); 
            box-shadow: 0 0 20px var(--accent); 
            transform: translateY(-5px); 
        }

        .player-box { 
            width: 100%; border-radius: 20px; overflow: hidden; 
            background: #000; border: 1px solid rgba(255,255,255,0.1); 
            height: 500px; box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }

        .btn-back { 
            margin-top: 40px; text-decoration: none; color: white; 
            font-size: 0.7rem; border: 1px solid var(--accent); 
            padding: 10px 25px; border-radius: 50px; transition: 0.3s;
            text-shadow: 0 0 5px var(--accent);
        }
        .btn-back:hover { background: var(--accent); color: black; box-shadow: 0 0 20px var(--accent); }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="system-label" id="status">ESTADO: SISTEMA_VIP_LISTO</div>

        <div class="playlist-nav">
            <div class="pl-card active" onclick="changeMusic('37i9dQZF1DX8f6LHDCurm5', '#ff0055', 'REGUETÓN')">
                <div class="cover-box">🔥</div>
                <p style="font-size: 8px; margin-top: 8px; opacity: 0.8;">REGUETÓN</p>
            </div>
            <div class="pl-card" onclick="changeMusic('4M7vRzXyZisD4YhG7f3iY8', '#00d4ff', 'PROYECTARSE')">
                <div class="cover-box">🌌</div>
                <p style="font-size: 8px; margin-top: 8px; opacity: 0.8;">PROYECTARSE</p>
            </div>
            <div class="pl-card" onclick="changeMusic('2Z8N03n9CAt2eM2L7I7n9A', '#a200ff', 'FAMILIA')">
                <div class="cover-box">🏠</div>
                <p style="font-size: 8px; margin-top: 8px; opacity: 0.8;">FAMILIA</p>
            </div>
        </div>

        <div class="player-box">
            <iframe id="sp-player" 
                src="https://open.spotify.com/embed/playlist/37i9dQZF1DX8f6LHDCurm5?utm_source=generator&theme=0" 
                width="100%" height="500" frameBorder="0" 
                allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture">
            </iframe>
        </div>

        <a href="Menu.html" class="btn-back">REGRESAR AL NÚCLEO</a>
    </div>

    <script>
        function changeMusic(id, color, nombre) {
            // Actualizamos el reproductor con el link LIMPIO
            const player = document.getElementById('sp-player');
            player.src = `https://open.spotify.com/embed/playlist/${id}?utm_source=generator&theme=0`;

            // Actualizamos la estética neón
            document.documentElement.style.setProperty('--accent', color);
            document.getElementById('status').innerText = `MODO_ACTIVO: ${nombre}`;

            // Manejo de tarjetas
            document.querySelectorAll('.pl-card').forEach(c => c.classList.remove('active'));
            event.currentTarget.classList.add('active');
        }
    </script>
</body>
</html>
