<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galería VIP - Collage</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --dorado: #ffca2c; --negro: #050505; }
        body { 
            background-color: var(--negro); 
            background-image: url('img/Fondo.png'); 
            background-size: cover; 
            background-attachment: fixed;
            color: white; 
            font-family: 'Courier New', Courier, monospace; 
        }
        
        /* Estilo Collage (Masonry) */
        .collage-grid {
            column-count: 1;
            column-gap: 15px;
        }
        @media (min-width: 640px) { .collage-grid { column-count: 2; } }
        @media (min-width: 1024px) { .collage-grid { column-count: 3; } }

        .foto-card {
            break-inside: avoid;
            margin-bottom: 15px;
            border: 1px solid rgba(255, 202, 44, 0.3);
            background: black;
            position: relative;
            cursor: pointer;
            transition: all 0.5s ease;
        }

        /* Efecto Blanco y Negro Temporal */
        .foto-img {
            width: 100%;
            height: auto; /* Para que la foto salga completa siempre */
            display: block;
            filter: grayscale(100%); /* Inician en blanco y negro */
            transition: filter 0.8s ease;
        }

        /* Al tocar o pasar el mouse recuperan color */
        .foto-card:active .foto-img, 
        .foto-card:hover .foto-img {
            filter: grayscale(0%);
        }

        .neon-text { color: var(--dorado); text-shadow: 0 0 10px rgba(255, 202, 44, 0.5); }
    </style>
</head>
<body>
    <div id="app" class="min-h-screen bg-black/80 backdrop-blur-sm p-4">
        <header class="max-w-6xl mx-auto border-b border-[#ffca2c]/30 pb-6 mb-8 flex justify-between items-center">
            <h1 class="text-xl font-bold neon-text uppercase tracking-tighter">RECUERDOS_VIP</h1>
            <div class="flex gap-2">
                <button onclick="document.getElementById('input-file').click()" class="bg-[#ffca2c] text-black px-3 py-2 font-bold text-[10px] uppercase">+ FOTO</button>
                <button onclick="window.location.href='Menu.html'" class="border border-[#ffca2c] px-3 py-2 text-[10px] uppercase neon-text">volver</button>
            </div>
            <input type="file" id="input-file" class="hidden" accept="image/*" onchange="subirFoto(this)">
        </header>

        <div id="galeria-grid" class="max-w-6xl mx-auto collage-grid">
            </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyA4mkzPcHmoaS2p6DwK3TnDjqg6R7pw9zA",
            authDomain: "familia-vip.firebaseapp.com",
            projectId: "familia-vip",
            storageBucket: "familia-vip.firebasestorage.app",
            messagingSenderId: "1085714188192",
            appId: "1:1085714188192:web:3c7f3a4d5a58c18d4ac6c5",
            databaseURL: "https://familia-vip-default-rtdb.firebaseio.com/"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function subirFoto(input) {
            const file = input.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const newPhotoKey = db.ref().child('fotos').push().key;
                    db.ref('fotos/' + newPhotoKey).set({
                        url: e.target.result,
                        fecha: new Date().toLocaleString()
                    });
                };
                reader.readAsDataURL(file);
            }
        }

        db.ref('fotos').on('value', (snapshot) => {
            const grid = document.getElementById('galeria-grid');
            grid.innerHTML = "";
            const data = snapshot.val();
            
            if (data) {
                Object.values(data).reverse().forEach(foto => {
                    grid.innerHTML += `
                        <div class="foto-card">
                            <img src="${foto.url}" class="foto-img">
                            <div class="p-2 text-[8px] flex justify-between bg-black/60">
                                <span class="opacity-40">${foto.fecha}</span>
                            </div>
                        </div>
                    `;
                });
            }
        });
    </script>
</body>
</html>
