<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galería Compartida - VIP</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --dorado: #ffca2c; --negro: #050505; }
        body { 
            background-color: var(--negro); 
            background-image: url('img/Fondo.png'); 
            background-size: cover; 
            background-attachment: fixed;
            color: white; 
            font-family: 'Courier New', Courier, monospace; 
        }
        .neon-border { border: 1px solid var(--dorado); box-shadow: 0 0 15px rgba(255, 202, 44, 0.2); }
        .neon-text { color: var(--dorado); text-shadow: 0 0 10px rgba(255, 202, 44, 0.5); }
    </style>
</head>
<body>
    <div id="app" class="min-h-screen bg-black/80 backdrop-blur-sm p-5">
        <header class="max-w-6xl mx-auto border-b border-[#ffca2c]/30 pb-6 mb-10 flex justify-between items-center">
            <h1 class="text-2xl font-bold neon-text uppercase">Galería_Realtime</h1>
            <div class="flex gap-4">
                <button onclick="document.getElementById('input-file').click()" class="bg-[#ffca2c] text-black px-4 py-2 font-bold text-xs uppercase hover:scale-105 transition-all">+ Subir Foto</button>
                <button onclick="window.location.href='Menu.html'" class="border border-[#ffca2c] px-4 py-2 text-xs uppercase neon-text">Volver al Hub</button>
            </div>
            <input type="file" id="input-file" class="hidden" accept="image/*" onchange="subirFoto(this)">
        </header>

        <div id="galeria-grid" class="max-w-6xl mx-auto grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
            </div>
    </div>

    <script>
        // --- TUS DATOS REALES DE FIREBASE ---
        const firebaseConfig = {
            apiKey: "AIzaSyA4mkzPcHmoaS2p6DwK3TnDjqg6R7pw9zA",
            authDomain: "familia-vip.firebaseapp.com",
            projectId: "familia-vip",
            storageBucket: "familia-vip.firebasestorage.app",
            messagingSenderId: "1085714188192",
            appId: "1:1085714188192:web:3c7f3a4d5a58c18d4ac6c5",
            databaseURL: "https://familia-vip-default-rtdb.firebaseio.com/" // Verifica este link en tu consola de Firebase
        };

        // Inicializar
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Función para subir fotos
        function subirFoto(input) {
            const file = input.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const newPhotoKey = db.ref().child('fotos').push().key;
                    db.ref('fotos/' + newPhotoKey).set({
                        url: e.target.result,
                        fecha: new Date().toLocaleString()
                    }).then(() => alert("¡Foto compartida con la banda!"))
                      .catch(err => alert("Error paps: " + err.message));
                };
                reader.readAsDataURL(file);
            }
        }

        // Mostrar fotos en tiempo real
        db.ref('fotos').on('value', (snapshot) => {
            const grid = document.getElementById('galeria-grid');
            grid.innerHTML = "";
            const data = snapshot.val();
            
            if (data) {
                Object.values(data).reverse().forEach(foto => {
                    grid.innerHTML += `
                        <div class="neon-border bg-black overflow-hidden">
                            <img src="${foto.url}" class="w-full h-64 object-cover">
                            <div class="p-2 text-[9px] flex justify-between opacity-50">
                                <span>RECUERDO_VIP</span>
                                <span>${foto.fecha}</span>
                            </div>
                        </div>
                    `;
                });
            } else {
                grid.innerHTML = "<p class='col-span-full text-center opacity-30'>No hay fotos todavía...</p>";
            }
        });
    </script>
</body>
</html>
