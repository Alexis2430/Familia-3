<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Distribución - VIP</title>
    <style>
        :root {
            --dorado: #ffca2c;
            --dorado-glow: rgba(255, 202, 44, 0.4);
            --dark-bg: #050505;
            --card-bg: rgba(10, 10, 10, 0.85);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Courier New', Courier, monospace;
        }

        body {
            background-color: var(--dark-bg);
            background-image: url('img/Fondo.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
            overflow-x: hidden;
        }

        /* Capa de oscuridad para que el texto resalte sobre el fondo */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.75);
            z-index: 0;
        }

        header {
            margin-bottom: 3.5rem;
            text-align: center;
            z-index: 10;
        }

        header h2 {
            font-size: clamp(1.8rem, 5vw, 3rem);
            color: var(--dorado);
            text-transform: uppercase;
            letter-spacing: 8px;
            text-shadow: 0 0 15px var(--dorado-glow), 0 0 30px var(--dorado-glow);
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            width: 100%;
            max-width: 1100px;
            z-index: 10;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 202, 44, 0.2);
            padding: 45px 25px;
            text-align: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            backdrop-filter: blur(5px);
        }

        .card:hover {
            transform: translateY(-8px);
            border-color: var(--dorado);
            box-shadow: 0 0 25px var(--dorado-glow);
            background: rgba(20, 20, 20, 0.95);
        }

        .card-icon {
            font-size: 3.5rem;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 10px var(--dorado-glow));
        }

        .card-title {
            color: #fff;
            font-size: 1.1rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .card:hover .card-title {
            color: var(--dorado);
            text-shadow: 0 0 8px var(--dorado);
        }

        /* Scanlines estéticas */
        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 100;
            opacity: 0.4;
        }

        .btn-back {
            margin-top: 3rem;
            z-index: 10;
            color: var(--dorado);
            text-decoration: none;
            font-size: 0.8rem;
            border: 1px solid var(--dorado);
            padding: 10px 20px;
            transition: 0.3s;
        }

        .btn-back:hover {
            background: var(--dorado);
            color: black;
        }
    </style>
</head>
<body>

    <div class="scanlines"></div>

    <header>
        <h2>SISTEMA DE DISTRIBUCIÓN</h2>
    </header>

<div class="menu-grid">
        <a href="calendario.html" class="card">
            <div class="card-icon">📅</div>
            <div class="card-title">Fechas Importantes</div>
        </a>

        <a href="galeria.html" class="card">
            <div class="card-icon">🖼️</div>
            <div class="card-title">Galería Familiar</div>
        </a>

        <a href="chat.html" class="card">
            <div class="card-icon">💬</div>
            <div class="card-title">Chat en Vivo</div>
        </a>

        <a href="musica.html" class="card">
            <div class="card-icon">🎵</div>
            <div class="card-title">Musiquita</div>
        </a>

        <a href="juegos.html" class="card">
            <div class="card-icon">🎮</div>
            <div class="card-title">Jueguitos</div>
        </a>

        <a href="planes.html" class="card">
            <div class="card-icon">🚀</div>
            <div class="card-title">Próximos Pasos</div>
        </a>
    </div>

    <a href="index.html" class="btn-back">SALIR DEL SISTEMA</a>

    <script>
        // Efecto de sonido al pasar el mouse por las tarjetas
        const cards = document.querySelectorAll('.card');
        cards.forEach(card => {
            card.addEventListener('mouseenter', () => {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(220, audioCtx.currentTime); 
                gain.gain.setValueAtTime(0.01, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.1);
            });
        });
    </script>
</body>
</html>
