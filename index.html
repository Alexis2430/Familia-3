<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Familia por Decisión</title>
    <style>
        :root {
            --dorado: #ffca2c;
            --negro: #050505;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Courier New', Courier, monospace;
        }

        /* CONFIGURACIÓN DE FONDO DIRECTA */
        body {
            width: 100%;
            min-height: 100vh;
            background-color: var(--negro);
            background-image: url('img/Fondo.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            overflow: hidden;
        }

        /* Filtro oscuro para resaltar el texto */
        .filtro-suave {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4); 
            z-index: 1;
        }

        main {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 20px;
            background: transparent !important;
        }

        h1 {
            font-size: clamp(2rem, 10vw, 4rem);
            text-transform: uppercase;
            letter-spacing: 8px;
            color: #fff;
            /* Brillo dorado premium */
            text-shadow: 0 0 15px var(--dorado), 2px 2px 4px rgba(0,0,0,0.8);
            margin-bottom: 3rem;
            background: transparent !important;
        }

        .btn-tuki {
            background: rgba(0, 0, 0, 0.6);
            color: var(--dorado);
            border: 3px solid var(--dorado);
            padding: 15px 50px;
            font-size: 1.8rem;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 0 15px rgba(255, 202, 44, 0.2);
        }

        .btn-tuki:hover {
            background: var(--dorado);
            color: #000;
            box-shadow: 0 0 40px var(--dorado);
            transform: scale(1.05);
        }

        /* Líneas de scanline estéticas */
        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.05) 50%);
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 5;
        }
    </style>
</head>
<body>

    <div class="filtro-suave"></div>
    <div class="scanlines"></div>

    <main>
        <h1>FAMILIA POR DECISIÓN</h1>
        <button class="btn-tuki" onclick="playTuki()">Tuki</button>
    </main>

    <script>
        function playTuki() {
            // Efecto de sonido sintético al hacer clic
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(200, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(500, audioCtx.currentTime + 0.1);
            
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            osc.start();
            osc.stop(audioCtx.currentTime + 0.3);

            // Redirección al Menú Principal después del sonido
            setTimeout(() => {
                window.location.href = "Menu.html";
            }, 400);
        }
    </script>
</body>
</html>
